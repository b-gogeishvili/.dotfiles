"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$username\
$hostname\
$kubernetes\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$package\
$bun\
$c\
$cmake\
$cpp\
$deno\
$golang\
$haskell\
$helm\
$lua\
$nodejs\
$pulumi\
$python\
$ruby\
$rust\
$terraform\
$vagrant\
$zig\
$memory_usage\
$custom\
$cmd_duration\
$character\
"""

[username]
disabled = true
show_always = true
format = '[$user]($style) at '
style_user = 'bold cyan'

[hostname]
disabled = true
ssh_only = false
format = '[$hostname]($style) at '
style = 'bold dimmed green'

[directory]
disabled = false
truncation_length = 4
format = '[$path]($style) '
style = 'bold cyan'
truncation_symbol ='…/'

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'

[time]
disabled = true

[status]
disabled = true

[os]
disabled = true

[shlvl]
disabled = true

[localip]
disabled = true

[container]
disabled = true

[shell]
disabled = true

[netns]
disabled = true

[battery]
disabled = true

[env_var]
disabled = true

[golang]
style = 'blue'
symbol = ' '

[python]
style = 'yellow'
symbol = '  ' 

