$background_image = /home/dante/.dotfiles/assets/wallpapers/mountains_red.png
$fail_color = A95143
$text_color = rgba(236,239,244,1)

$entry_background_color = rgba(30, 30, 46, 0.14)
$entry_border_color = rgba(3B3B3B00)
$entry_color = rgba(eceff4ee)
$font_family = CodeNewRoman Nerd Font Propo
$font_family_clock = DSEG14 Classic
$font_material_symbols = Material Icons Round

general {
    ignore_empty_input = true
    grace = 0
    fail_timeout = 1000
}

animations {
    enabled = true
    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = fadeIn, 0
    animation = fadeOut, 1, 2, smooth
    animation = inputFieldDots, 1, 1.5, smooth
    animation = inputFieldColors, 1, 2, smooth
}

background {
    monitor =
    path = $background_image
    blur_passes = 2
    blur_size = 4
}

input-field {
    monitor =
    size = 400, 80
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.4
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $text_color
    fail_color = $fail_color
    check_color = $entry_background_color
    placeholder_text = 
    fail_text = <span foreground="##$fail_color">$FAIL</span>

    fade_on_empty = false
    rounding = 20

    position = 0, 0
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = $TIME
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 90
    font_family = $font_family_clock

    position = 0, -50
    halign = center
    valign = top
}

label { 
    monitor =
    text = cmd[update:3000] echo "$(date +"%A, %B %d, %Y")"
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 18
    font_family = $font_family

    position = 0, -200
    halign = center
    valign = top
}

# Quote
label { 
    monitor =
    text =  “In three words I can sum up everything I`ve learned about life: it goes on.”
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 16
    font_family = $font_family

    position = 0, 50
    halign = center
    valign = bottom
}

# lock icon
label { 
    monitor =
    text = lock
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 22
    font_family = $font_material_symbols

    position = 0, 150
    halign = center
    valign = bottom
}

# "locked" text
label { 
    monitor =
    text = locked
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 14
    font_family = $font_family

    position = 0, 120
    halign = center
    valign = bottom
}

# Battery Status
label { 
    monitor =
    text = cmd[update:1000] ~/.dotfiles/scripts/battery.sh
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 18
    font_family = $font_family

    position = -30, -20
    halign = right
    valign = top
}

# Current Language
label { 
    monitor =
    text = cmd[update:500] ~/.dotfiles/scripts/get-lang.sh
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 18
    font_family = $font_family

    position = -120, -20
    halign = right
    valign = top
}
